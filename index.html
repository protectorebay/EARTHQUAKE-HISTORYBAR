<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake Ticker</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
}

#container {
    width: 1920px;
    height: 120px;
    background: rgba(0,0,0,0.7);
    display: flex;
    overflow: hidden;
}

.box {
    flex: 1;
    padding: 10px 15px;
    color: white;
    border-right: 1px solid rgba(255,255,255,0.15);
    display: flex;
    flex-direction: column;
    justify-content: center;
    transition: transform 0.4s ease, opacity 0.4s ease;
}

.mag {
    font-size: 32px;
    font-weight: bold;
    line-height: 1;
}

.loc {
    font-size: 16px;
    font-weight: bold;
    margin-top: 5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.depth {
    font-size: 14px;
    font-weight: bold;
    opacity: 0.85;
}

</style>
</head>

<body>

<div id="container"></div>

<script>

let earthquakes = [];

async function fetchData() {
    try {
        const res = await fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson");
        const data = await res.json();

        const newData = data.features
            .sort((a, b) => b.properties.time - a.properties.time)
            .slice(0, 6)
            .map(eq => ({
                mag: eq.properties.mag ? eq.properties.mag.toFixed(1) : "0.0",
                place: eq.properties.place,
                depth: eq.geometry.coordinates[2].toFixed(1)
            }));

        updateTicker(newData);

    } catch (e) {
        console.error("Fetch error:", e);
    }
}

function updateTicker(newData) {

    const container = document.getElementById("container");

    // prvé naplnenie
    if (earthquakes.length === 0) {
        earthquakes = newData;
        render();
        return;
    }

    // ak je nové zemetrasenie iné než prvé → shift
    if (newData[0].place !== earthquakes[0].place || newData[0].mag !== earthquakes[0].mag) {

        earthquakes.unshift(newData[0]); // pridaj nové na začiatok
        earthquakes = earthquakes.slice(0, 6); // drž len 6

        render(true);
    }
}

function render(animate = false) {

    const container = document.getElementById("container");
    container.innerHTML = "";

    earthquakes.forEach((eq, index) => {

        const box = document.createElement("div");
        box.className = "box";

        if (animate) {
            box.style.transform = "translateX(-20px)";
            box.style.opacity = "0";
            setTimeout(() => {
                box.style.transform = "translateX(0)";
                box.style.opacity = "1";
            }, 50);
        }

        box.innerHTML = `
            <div class="mag">${eq.mag}</div>
            <div class="loc">${eq.place}</div>
            <div class="depth">Depth: ${eq.depth} km</div>
        `;

        container.appendChild(box);
    });
}

// init
fetchData();
setInterval(fetchData, 60000);

</script>

</body>
</html>
