<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Earthquake Compact Ticker</title>

<style>
body {
    margin: 0;
    background: transparent;
    font-family: Arial, sans-serif;
}

#container {
    width: 1920px;
    height: 70px;
    background: rgba(0,0,0,0.75);
    display: flex;
    overflow: hidden;
}

.box {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 5px 10px;
    border-right: 1px solid rgba(255,255,255,0.15);
    color: white;
}

/* MAGNITUDE */
.mag {
    font-size: 42px;
    font-weight: bold;
    margin-right: 15px;
    min-width: 70px;
}

/* TEXT BLOK */
.info {
    flex: 1;
    overflow: hidden;
}

.loc {
    font-size: 16px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.depth {
    font-size: 14px;
    opacity: 0.85;
}

/* TIME BADGE */
.time {
    background: rgba(255,255,255,0.9);
    color: black;
    padding: 5px 10px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: bold;
    margin-left: 10px;
    white-space: nowrap;
}

</style>
</head>

<body>

<div id="container"></div>

<script>

let earthquakes = [];

/* výpočet "X min ago" */
function getTimeAgo(timestamp) {
    const now = Date.now();
    const diff = Math.floor((now - timestamp) / 60000);

    if (diff < 1) return "Just now";
    if (diff === 1) return "1 min ago";
    return diff + " min ago";
}

/* fetch USGS */
async function fetchData() {
    try {
        const res = await fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson");
        const data = await res.json();

        const newData = data.features
            .sort((a, b) => b.properties.time - a.properties.time)
            .slice(0, 6)
            .map(eq => ({
                mag: eq.properties.mag ? eq.properties.mag.toFixed(1) : "0.0",
                place: eq.properties.place,
                depth: eq.geometry.coordinates[2].toFixed(1),
                time: eq.properties.time
            }));

        updateTicker(newData);

    } catch (e) {
        console.error(e);
    }
}

/* update logika */
function updateTicker(newData) {

    if (earthquakes.length === 0) {
        earthquakes = newData;
        render();
        return;
    }

    // kontrola nového quake
    if (newData[0].time !== earthquakes[0].time) {
        earthquakes.unshift(newData[0]);
        earthquakes = earthquakes.slice(0, 6);
        render();
    }
}

/* render */
function render() {
    const container = document.getElementById("container");
    container.innerHTML = "";

    earthquakes.forEach(eq => {

        const box = document.createElement("div");
        box.className = "box";

        box.innerHTML = `
            <div class="mag">${eq.mag}</div>
            <div class="info">
                <div class="loc">${eq.place}</div>
                <div class="depth">Depth: ${eq.depth} km</div>
            </div>
            <div class="time" data-time="${eq.time}">
                ${getTimeAgo(eq.time)}
            </div>
        `;

        container.appendChild(box);
    });
}

/* každú minútu refresh text času */
function updateTimes() {
    document.querySelectorAll(".time").forEach(el => {
        const t = parseInt(el.getAttribute("data-time"));
        el.textContent = getTimeAgo(t);
    });
}

/* init */
fetchData();
setInterval(fetchData, 60000);
setInterval(updateTimes, 60000);

</script>

</body>
</html>
